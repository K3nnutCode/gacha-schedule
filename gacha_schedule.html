<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha Schedule 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --border: #2a2a4a;
    --text: #e0e0f0;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --gold: #f0c040;
    --green: #2D6A4F;
    --blue: #1B6CA8;
    --red: #C84B31;
    --purple: #4A4E69;
    --grey: #5F5E5A;
    --success: #2ecc71;
    --warning: #d4a017;
    --danger: #e74c3c;
    --info: #3498db;
    --radius: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--gold);
    flex: 1;
    min-width: 200px;
  }

  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  .stat b { color: var(--text); font-weight: 600; }

  .sync-bar {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 1.5rem;
    font-size: 12px;
    color: var(--text3);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .sync-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem 3rem;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .filter-btn.active { background: var(--bg3); border-color: var(--text2); color: var(--text); font-weight: 500; }

  .month-block { margin-bottom: 2rem; }

  .month-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .day-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.12s, opacity 0.2s;
    user-select: none;
  }

  .day-row:hover { background: var(--bg2); }
  .day-row.done { opacity: 0.4; }
  .day-row.done .check-circle { background: var(--success); border-color: transparent; }
  .day-row.done .check-circle svg { opacity: 1; }
  .day-row.saving { pointer-events: none; }
  .day-row.saving .check-circle { border-color: var(--warning); }
  .day-row.is-today { border-color: var(--info); }

  .date-col { width: 78px; flex-shrink: 0; }
  .date-num { font-size: 13px; font-weight: 600; color: var(--text); }
  .day-name { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .game-pill {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 88px;
    text-align: center;
  }

  .focus-col { font-size: 12px; color: var(--text2); flex: 1; }

  .nte-tag {
    font-size: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .today-badge {
    font-size: 10px;
    background: rgba(52,152,219,0.15);
    color: var(--info);
    border-radius: 20px;
    padding: 2px 7px;
    flex-shrink: 0;
    border: 1px solid rgba(52,152,219,0.3);
  }

  .check-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .check-circle svg {
    width: 13px; height: 13px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .nte-rule {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nte-rule span { color: var(--purple); font-weight: 600; }

  @media (max-width: 600px) {
    .focus-col { display: none; }
    .nte-tag { display: none; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🎮 Gacha Schedule — Jun 23 → Aug 22, 2026</h1>
    <div class="stats">
      <div class="stat">Done <b id="done-count">0</b>/61</div>
      <div class="stat">Endfield <b id="ef-count">0</b>/21</div>
      <div class="stat">WuWa <b id="ww-count">0</b>/18</div>
      <div class="stat">ZZZ <b id="zzz-count">0</b>/18</div>
    </div>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot syncing" id="sync-dot"></div>
  <span id="sync-label">Connecting to Google Sheet...</span>
</div>

<main>
  <div class="nte-rule">
    ⚡ <span>NTE — every single day</span>: 5–10 min stamina dump + dailies. Runs underneath the rotation, not instead of it.
  </div>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Endfield">Endfield</button>
    <button class="filter-btn" data-filter="WuWa">WuWa</button>
    <button class="filter-btn" data-filter="ZZZ">ZZZ / Free</button>
    <button class="filter-btn" data-filter="todo">Undone only</button>
  </div>
  <div id="schedule-list"></div>
</main>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbxBOHAdpji2plZzikpGtvunoAe08GPLouGtEOdpCezqOg0p-xNA995h1O4w_nd9v7DO/exec";

const SCHEDULE = {
  Monday:    { game: "Endfield",   color: "#2D6A4F", focus: "Factory + Combat + Story" },
  Tuesday:   { game: "WuWa",       color: "#1B6CA8", focus: "Story session" },
  Wednesday: { game: "Endfield",   color: "#2D6A4F", focus: "Factory check — don't skip" },
  Thursday:  { game: "ZZZ",        color: "#C84B31", focus: "Backlog catch-up" },
  Friday:    { game: "WuWa",       color: "#1B6CA8", focus: "Story session" },
  Saturday:  { game: "Endfield",   color: "#2D6A4F", focus: "Extended — weekend audit" },
  Sunday:    { game: "ZZZ / Free", color: "#5F5E5A", focus: "Overflow or full rest — no guilt" },
};

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const start = new Date(2026, 5, 23);
const today = new Date();

let done = {};
let filter = "all";
let pendingSaves = {};

function setSyncStatus(state, label) {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-label");
  dot.className = "sync-dot" + (state === "syncing" ? " syncing" : state === "error" ? " error" : "");
  lbl.textContent = label;
}

async function loadFromSheet() {
  setSyncStatus("syncing", "Loading from Google Sheet...");
  try {
    const res = await fetch(WEBHOOK + "?t=" + Date.now());
    const data = await res.json();
    if (data.success) {
      done = data.done || {};
      const count = Object.values(done).filter(Boolean).length;
      setSyncStatus("ok", count > 0 ? `Loaded — ${count} day${count !== 1 ? "s" : ""} done` : "Connected — tap any day to mark done");
    } else {
      setSyncStatus("error", "Sheet returned an error");
    }
  } catch(e) {
    setSyncStatus("error", "Could not reach Google Sheet — check your internet connection");
  }
  render();
}

async function saveToSheet(dayIndex, isDone) {
  setSyncStatus("syncing", "Saving to Google Sheet...");
  try {
    const url = `${WEBHOOK}?dayIndex=${dayIndex}&done=${isDone}&t=${Date.now()}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.success) {
      const count = Object.values(done).filter(Boolean).length;
      setSyncStatus("ok", `Saved ✔  — ${count} day${count !== 1 ? "s" : ""} done`);
    } else {
      setSyncStatus("error", "Save failed — try again");
      done[dayIndex] = !isDone;
    }
  } catch(e) {
    setSyncStatus("error", "Could not reach Google Sheet");
    done[dayIndex] = !isDone;
  }
  delete pendingSaves[dayIndex];
  render();
}

function getDayData(offset) {
  const d = new Date(start);
  d.setDate(d.getDate() + offset);
  const dayName = DAYS[d.getDay()];
  return { d, dayName, ...SCHEDULE[dayName] };
}

function render() {
  const list = document.getElementById("schedule-list");
  list.innerHTML = "";

  let doneCount = 0, efDone = 0, wwDone = 0, zzzDone = 0;
  for (let i = 0; i < 61; i++) {
    if (done[i]) {
      doneCount++;
      const { game } = getDayData(i);
      if (game === "Endfield") efDone++;
      else if (game === "WuWa") wwDone++;
      else zzzDone++;
    }
  }
  document.getElementById("done-count").textContent = doneCount;
  document.getElementById("ef-count").textContent = efDone;
  document.getElementById("ww-count").textContent = wwDone;
  document.getElementById("zzz-count").textContent = zzzDone;

  const groups = {};
  for (let i = 0; i < 61; i++) {
    const { d, game } = getDayData(i);
    const isDone = !!done[i];
    if (filter === "todo" && isDone) continue;
    if (filter !== "all" && filter !== "todo") {
      if (filter === "ZZZ / Free") { if (!game.startsWith("ZZZ")) continue; }
      else if (game !== filter) continue;
    }
    const key = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  }

  Object.entries(groups).forEach(([month, offsets]) => {
    const block = document.createElement("div");
    block.className = "month-block";
    block.innerHTML = `<div class="month-label">${month}</div>`;

    offsets.forEach(i => {
      const { d, dayName, game, color, focus } = getDayData(i);
      const isDone = !!done[i];
      const isSaving = !!pendingSaves[i];
      const isToday = d.toDateString() === today.toDateString();

      const row = document.createElement("div");
      row.className = [
        "day-row",
        isDone ? "done" : "",
        isToday ? "is-today" : "",
        isSaving ? "saving" : ""
      ].filter(Boolean).join(" ");

      row.innerHTML = `
        <div class="date-col">
          <div class="date-num">${d.getDate()} ${MONTHS[d.getMonth()]}</div>
          <div class="day-name">${dayName}</div>
        </div>
        <div class="game-pill" style="background:${color}">${game}</div>
        <div class="focus-col">${focus}</div>
        <div class="nte-tag">⚡ NTE daily</div>
        ${isToday ? '<div class="today-badge">today</div>' : ''}
        <div class="check-circle">
          <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
        </div>
      `;

      row.addEventListener("click", () => {
        if (pendingSaves[i]) return;
        const newState = !done[i];
        done[i] = newState;
        pendingSaves[i] = true;
        render();
        saveToSheet(i, newState);
      });

      block.appendChild(row);
    });

    list.appendChild(block);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    filter = btn.dataset.filter;
    render();
  });
});

loadFromSheet();
</script>
</body>
</html>
